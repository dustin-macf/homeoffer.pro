<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#4f46e5"/>
  
  <!-- Gradient defs -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- House shape (main icon) -->
  <g transform="translate(128, 128)">
    <!-- House base -->
    <path d="M -60 -20 L 0 -70 L 60 -20 L 60 50 L -60 50 Z" fill="white" stroke="none"/>
    
    <!-- Roof accent -->
    <path d="M -60 -20 L 0 -70 L 60 -20" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Door -->
    <rect x="-15" y="0" width="30" height="50" fill="#4f46e5" rx="2"/>
    <circle cx="12" cy="25" r="3" fill="#fbbf24"/>
    
    <!-- Window left -->
    <rect x="-45" y="-10" width="20" height="20" fill="#e0e7ff" rx="2"/>
    <line x1="-35" y1="-10" x2="-35" y2="10" stroke="#4f46e5" stroke-width="1"/>
    <line x1="-45" y1="0" x2="-25" y2="0" stroke="#4f46e5" stroke-width="1"/>
    
    <!-- Window right -->
    <rect x="25" y="-10" width="20" height="20" fill="#e0e7ff" rx="2"/>
    <line x1="35" y1="-10" x2="35" y2="10" stroke="#4f46e5" stroke-width="1"/>
    <line x1="25" y1="0" x2="45" y2="0" stroke="#4f46e5" stroke-width="1"/>
  </g>
  
  <!-- Text: OFFER -->
  <text x="128" y="210" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">OFFER</text>
</svg>
